<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EPS-SG Earth Observation - India Centered</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #030712;
    }

    canvas {
      display: block;
    }

    .clean-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>

<body>
  <div class="clean-overlay"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';

    // ------------------------------------------------------------
    // 1. SCENE, CAMERA, RENDERER
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030712);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(-4.5, 2.1, 7.5);
    camera.lookAt(0.5, -0.3, 0.5);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance",
      alpha: false
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ------------------------------------------------------------
    // 2. POST PROCESSING
    // ------------------------------------------------------------
    const renderScene = new RenderPass(scene, camera);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.25, 0.2, 0.1);
    bloomPass.threshold = 0.35;
    bloomPass.strength = 0.28;
    bloomPass.radius = 0.55;

    const rgbShiftPass = new ShaderPass(RGBShiftShader);
    rgbShiftPass.uniforms['amount'].value = 0.0002;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    composer.addPass(rgbShiftPass);
    rgbShiftPass.renderToScreen = true;

    // ------------------------------------------------------------
    // 3. CINEMATIC MOODY LIGHTING ENGINE
    // ------------------------------------------------------------
    const sunLight = new THREE.DirectionalLight(0xfff5ea, 2.0);
    sunLight.position.set(8.0, 1.0, 5.0);
    scene.add(sunLight);

    const planetFillLight = new THREE.DirectionalLight(0x2b4c7e, 2.5);
    planetFillLight.position.set(-5.0, 3.0, 3.0);
    scene.add(planetFillLight);

    const ambientLight = new THREE.AmbientLight(0x2c53de);
    scene.add(ambientLight);

    // ------------------------------------------------------------
    // 4. TWILIGHT EARTH LAYER SYSTEM (INDIA FIXED RE-CENTER)
    // ------------------------------------------------------------
    const textureLoader = new THREE.TextureLoader();

    const earthMapUrl = 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';
    const earthSpecularUrl = 'https://threejs.org/examples/textures/planets/earth_specular_2048.jpg';
    const earthNormalUrl = 'https://threejs.org/examples/textures/planets/earth_normal_2048.jpg';
    const cloudMapUrl = 'https://threejs.org/examples/textures/planets/earth_clouds_1024.png';

    const earthGeometry = new THREE.SphereGeometry(5.8, 128, 128);

    const earthMaterial = new THREE.MeshStandardMaterial({
      map: textureLoader.load(earthMapUrl),
      roughnessMap: textureLoader.load(earthSpecularUrl),
      roughness: 0.5,
      metalness: 0.2,
      color: new THREE.Color(0x5670a3),
      normalMap: textureLoader.load(earthNormalUrl),
      normalScale: new THREE.Vector2(0.4, 0.4),
    });

    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    // Adjusted position to frame India perfectly against your homepage content layout
    earth.position.set(2.5, -1.2, -1.0);

    // FIXED CORRECTION: Precise rotation value mapping to lock the Indian Subcontinent in center view
    earth.rotation.y = 3.25;
    scene.add(earth);

    // Clouds Setup
    const cloudGeometry = new THREE.SphereGeometry(5.83, 128, 128);
    const cloudTexture = textureLoader.load(cloudMapUrl);
    cloudTexture.minFilter = THREE.LinearFilter;

    const cloudMaterial = new THREE.MeshPhongMaterial({
      map: cloudTexture,
      transparent: true,
      opacity: 0.25,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
    clouds.position.copy(earth.position);
    clouds.rotation.y = 5.25; // Perfectly matched cloud map sync
    scene.add(clouds);

    // Atmospheric limb ring
    const atmosphereGeometry = new THREE.SphereGeometry(5.89, 64, 64);
    const atmosphereMaterial = new THREE.MeshPhongMaterial({
      color: 0x3b82f6,
      emissive: new THREE.Color(0x103a7a),
      transparent: true,
      opacity: 0.15,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      depthWrite: false
    });
    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    atmosphere.position.copy(earth.position);
    scene.add(atmosphere);

    // ------------------------------------------------------------
    // 5. FINE COSMIC STARFIELD
    // ------------------------------------------------------------
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 1200;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      const radius = 45 + Math.random() * 35;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI * 0.7;
      starsPositions[i] = Math.cos(theta) * Math.sin(phi) * radius;
      starsPositions[i + 1] = Math.cos(phi) * radius * 0.8 + 5.2;
      starsPositions[i + 2] = Math.sin(theta) * Math.sin(phi) * radius - 3.8;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const stars = new THREE.Points(starsGeometry, new THREE.PointsMaterial({
      color: 0x8da2fb, size: 0.09, blending: THREE.AdditiveBlending,
      depthWrite: false, opacity: 0.5, sizeAttenuation: true
    }));
    scene.add(stars);

    // ------------------------------------------------------------
    // 6. CRISP METALLIC EPS-SG (METOP-SG A) SATELLITE
    // ------------------------------------------------------------
    const satelliteGroup = new THREE.Group();
    satelliteGroup.scale.set(0.18, 0.18, 0.18);

    const metalGrey = new THREE.MeshStandardMaterial({ color: 0xc8ced9, roughness: 0.2, metalness: 0.95 });
    const darkMetal = new THREE.MeshStandardMaterial({ color: 0x3a3f47, roughness: 0.4, metalness: 0.85 });
    const whitePanel = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.1 });
    const goldFoil = new THREE.MeshStandardMaterial({ color: 0xe5b83b, roughness: 0.15, metalness: 0.85 });
    const blackKapton = new THREE.MeshStandardMaterial({ color: 0x0a0a0d, roughness: 0.4, metalness: 0.7 });
    const solarCellBlue = new THREE.MeshStandardMaterial({ color: 0x0b224e, roughness: 0.15, metalness: 0.95, emissive: new THREE.Color(0x000108) });
    const instrumentLens = new THREE.MeshStandardMaterial({ color: 0xe6ca8e, roughness: 0.05, metalness: 0.95 });

    const mainBusGroup = new THREE.Group();
    const busBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), goldFoil);
    mainBusGroup.add(busBody);

    const radiator = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.6, 0.75), whitePanel);
    radiator.position.set(0.41, 0, 0);
    mainBusGroup.add(radiator);

    const instrumentPlatform = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.1, 0.9), darkMetal);
    instrumentPlatform.position.set(0, -0.95, 0);
    mainBusGroup.add(instrumentPlatform);

    const sentinel5 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.4), blackKapton);
    sentinel5.position.set(-0.2, -1.2, 0.2);
    mainBusGroup.add(sentinel5);

    const metImage = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.3, 16), metalGrey);
    metImage.position.set(0.2, -1.1, -0.2);
    metImage.rotation.x = Math.PI / 2;
    mainBusGroup.add(metImage);

    const mwsSounder = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.2, 12), instrumentLens);
    mwsSounder.position.set(0, -1.1, 0.25);
    mainBusGroup.add(mwsSounder);

    const solarArrayAssembly = new THREE.Group();
    solarArrayAssembly.position.set(-0.4, 0.4, 0);

    const solarYoke = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.4, 8), darkMetal);
    solarYoke.rotation.z = Math.PI / 2;
    solarYoke.position.set(-0.2, 0, 0);
    solarArrayAssembly.add(solarYoke);

    const mainPanel = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.03, 1.2), solarCellBlue);
    mainPanel.position.set(-1.6, 0, 0);
    solarArrayAssembly.add(mainPanel);

    const panelFrame = new THREE.Mesh(new THREE.BoxGeometry(2.42, 0.05, 0.04), metalGrey);
    panelFrame.position.set(-1.6, -0.02, 0);
    solarArrayAssembly.add(panelFrame);

    mainBusGroup.add(solarArrayAssembly);

    const antennaStem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), darkMetal);
    antennaStem.position.set(0.2, 0.95, 0.2);
    mainBusGroup.add(antennaStem);

    const highGainDish = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.12, 16, 1, true), whitePanel);
    highGainDish.position.set(0.2, 1.1, 0.2);
    highGainDish.rotation.x = -Math.PI / 4;
    mainBusGroup.add(highGainDish);

    satelliteGroup.add(mainBusGroup);
    scene.add(satelliteGroup);

    // ------------------------------------------------------------
    // 7. ORBIT CONFIGURATION & ANIMATION RUNTIME 
    // ------------------------------------------------------------
    const earthCenter = earth.position;
    const orbitRadius = 6.35;
    const orbitSpeed = 0.24;

    const inclinationX = -0.3;
    const inclinationY = 0.92;

    function animate() {
      const elapsedTime = performance.now() * 0.001;
      const angle = elapsedTime * orbitSpeed;

      const rawX = Math.cos(angle) * orbitRadius;
      const rawZ = Math.sin(angle) * orbitRadius;
      const rawY = Math.cos(angle) * 0.9;

      const satX = earthCenter.x + rawX * inclinationY - rawZ * inclinationX;
      const satZ = earthCenter.z + rawZ * inclinationY + rawX * inclinationX;
      const satY = earthCenter.y + rawY + (rawZ * 0.2);

      satelliteGroup.position.set(satX, satY, satZ);

      const lookAheadAngle = angle + 0.01;
      const aheadX = earthCenter.x + Math.cos(lookAheadAngle) * orbitRadius * inclinationY - Math.sin(lookAheadAngle) * orbitRadius * inclinationX;
      const aheadZ = earthCenter.z + Math.sin(lookAheadAngle) * orbitRadius * inclinationY + Math.cos(lookAheadAngle) * orbitRadius * inclinationX;
      const aheadY = earthCenter.y + Math.cos(lookAheadAngle) * 0.9 + (Math.sin(lookAheadAngle) * orbitRadius * 0.2);

      const forwardVector = new THREE.Vector3(aheadX, aheadY, aheadZ);
      satelliteGroup.lookAt(forwardVector);

      mainBusGroup.lookAt(earthCenter);
      mainBusGroup.rotateX(Math.PI / 2);

      solarArrayAssembly.rotation.y = elapsedTime * 0.12;

      // Kept at static/near-static rotation speed to maintain beautiful background framing on your page
      earth.rotation.y += 0.0005;
      clouds.rotation.y += 0.0008;

      composer.render();
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🛰️ Target Confirmed: India perfectly locked in viewpoint core.');
  </script>
</body>

</html>
