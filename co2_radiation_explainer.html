<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How CO₂ Satellites Work — Interactive Explainer</title>

<link href="assets/img/Favicon-1.png" rel="icon">
<link href="assets/img/Favicon-1.png" rel="apple-touch-icon">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
  --bg: #08090f;
  --panel: #0d1618;
  --border: #1c2235;
  --sun: #ffd84d;
  --solar: #ffe166;
  --scatter: #4da6ff;
  --absorb: #ff4d6d;
  --reflect: #4dffb8;
  --emit: #ff8c42;
  --co2: #ff4d4d;
  --signal: #b84dff;
  --text: #ebebeb;
  --dim: #3a4560;
  --accent: #4da6ff;
  --earth-surf: #1a3d2b;
  --atmo: #0d1f3c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
}

header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  color: #e8f0ff;
  letter-spacing: -0.01em;
}
header p {
  font-size: 0.85rem;
  color: var(--dim);
  margin-top: 4px;
}
/* Header layout with buttons */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 36px 40px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  backdrop-filter: blur(12px);
}

.header-left {
  display: flex;
  flex-direction: column;
}

.header-right {
  display: flex;
  gap: 12px;
}

.nav-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  padding: 8px 14px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s ease;
  background: var(--surface);
}

.nav-btn:hover {
  border-color: #e8c84a;
  background: #111820;
  color: #ffffff;
}


.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 90px);
}

/* ─── LEFT PANEL: step list ─── */
.steps-panel {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
}

.step-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  width: 100%;
  padding: 12px 18px;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}
.step-btn:hover { background: #0f1420; }
.step-btn.active {
  background: #0f1420;
  border-left-color: var(--accent);
}
.step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
  border: 1.5px solid currentColor;
}
.step-label {
  font-size: 0.78rem;
  color: #8094b8;
  line-height: 1.4;
}
.step-btn.active .step-label { color: #c8d4e8; }
.step-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: #a0b4d0;
  display: block;
  margin-bottom: 2px;
}
.step-btn.active .step-title { color: #e0ecff; }

/* ─── RIGHT: diagram + info ─── */
.main-area {
  display: grid;
  grid-template-rows: 1fr 240px;
  overflow: hidden;
}

.diagram-area {
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

svg.main-svg {
  width: 100%;
  height: 100%;
}

/* ─── INFO PANEL ─── */
.info-panel {
  border-top: 1px solid var(--border);
  background: var(--panel);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  overflow: hidden;
}
.info-col {
  padding: 18px 20px;
  border-right: 1px solid var(--border);
}
.info-col:last-child { border-right: none; }
.info-col h4 {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 10px;
}
.info-col .main-text {
  font-size: 0.82rem;
  color: #a8bcd8;
  line-height: 1.65;
}
.info-col .formula {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: #7090b8;
  background: #0a0d14;
  border: 1px solid #1a2535;
  border-radius: 3px;
  padding: 8px 10px;
  margin-top: 10px;
  line-height: 1.7;
}
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 2px;
  font-size: 0.68rem;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  margin-right: 4px;
}

/* step color coding */
.c-solar  { color: var(--solar);   border-color: var(--solar);   }
.c-scatter{ color: var(--scatter); border-color: var(--scatter); }
.c-absorb { color: var(--absorb);  border-color: var(--absorb);  }
.c-reflect{ color: var(--reflect); border-color: var(--reflect); }
.c-emit   { color: var(--emit);    border-color: var(--emit);    }
.c-co2    { color: var(--co2);     border-color: var(--co2);     }
.c-signal { color: var(--signal);  border-color: var(--signal);  }

.highlight { font-weight: 600; }

/* animation classes managed by JS */
.beam { opacity: 0; transition: opacity 0.5s; }
.beam.show { opacity: 1; }

</style>
</head>

<header class="header-bar">
  <div class="header-left">
    <h1>How CO₂ Satellites Measure Atmospheric Carbon Dioxide</h1>
    <p>Follow each step — from sunlight entering the atmosphere to the satellite computing XCO₂</p>
  </div>

  <div class="header-right">
    <a href="Remote-sensing-content.html" class="nav-btn">
      <i class="fas fa-arrow-left"></i> Content
    </a>
    <a href="index.html#portfolio" class="nav-btn">
      Home <i class="fas fa-arrow-right"></i>
    </a>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Step list -->
  <div class="steps-panel" id="stepsPanel">
    <!-- generated by JS -->
  </div>

  <!-- RIGHT: diagram + info -->
  <div class="main-area">
    <div class="diagram-area">
      <svg class="main-svg" viewBox="0 0 800 480" id="mainSvg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff8cc"/>
            <stop offset="60%" stop-color="#ffd84d"/>
            <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="satGrad" cx="40%" cy="30%" r="60%">
            <stop offset="0%" stop-color="#2a4070"/>
            <stop offset="100%" stop-color="#0d1428"/>
          </radialGradient>
          <!-- arrow markers -->
          <marker id="mSolar"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ffe166"/></marker>
          <marker id="mScatter" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4da6ff"/></marker>
          <marker id="mAbsorb"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ff4d6d"/></marker>
          <marker id="mReflect" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4dffb8"/></marker>
          <marker id="mEmit"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ff8c42"/></marker>
          <marker id="mCo2"     markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ff4d4d"/></marker>
          <marker id="mSignal"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#b84dff"/></marker>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>

        <!-- ═══ STATIC SCENE ═══ -->

        <!-- Stars -->
        <rect width="800" height="480" fill="#08090f"/>
        <circle cx="50" cy="20" r="1" fill="#ffffff" opacity="0.4"/>
        <circle cx="150" cy="35" r="0.8" fill="#ffffff" opacity="0.3"/>
        <circle cx="700" cy="15" r="1" fill="#ffffff" opacity="0.4"/>
        <circle cx="760" cy="40" r="0.8" fill="#ffffff" opacity="0.3"/>
        <circle cx="620" cy="10" r="1.2" fill="#ffffff" opacity="0.5"/>

        <!-- Atmosphere band -->
        <rect x="0" y="100" width="800" height="230" fill="#0d1f3c" opacity="0.5"/>
        <line x1="0" y1="100" x2="800" y2="100" stroke="#1a3055" stroke-width="1" stroke-dasharray="5,4"/>
        <line x1="0" y1="330" x2="800" y2="330" stroke="#1a3055" stroke-width="1" stroke-dasharray="5,4"/>
        <text x="12" y="118" fill="#1e3a5f" font-size="9" font-family="IBM Plex Mono" letter-spacing="2">ATMOSPHERE</text>
        <text x="12" y="346" fill="#1a3525" font-size="9" font-family="IBM Plex Mono" letter-spacing="2">EARTH SURFACE</text>

        <!-- Earth surface -->
        <rect x="0" y="330" width="800" height="150" fill="#0e1f14"/>
        <!-- surface texture lines -->
        <line x1="0" y1="340" x2="800" y2="340" stroke="#1a3020" stroke-width="0.5"/>

        <!-- Molecule labels in atmosphere (static) -->
        <text x="120" y="175" fill="#1e3a5f" font-size="8" font-family="IBM Plex Mono">O₃</text>
        <text x="200" y="220" fill="#1e3a5f" font-size="8" font-family="IBM Plex Mono">N₂ O₂</text>
        <text x="350" y="185" fill="#1a2a40" font-size="8" font-family="IBM Plex Mono">CO₂</text>
        <text x="460" y="240" fill="#1a2a40" font-size="8" font-family="IBM Plex Mono">H₂O</text>
        <text x="560" y="195" fill="#1a2a40" font-size="8" font-family="IBM Plex Mono">CO₂</text>
        <text x="300" y="290" fill="#1a2a40" font-size="8" font-family="IBM Plex Mono">aerosols</text>

        <!-- SUN -->
        <circle cx="80" cy="55" r="32" fill="url(#sg)" opacity="0.85"/>
        <circle cx="80" cy="55" r="18" fill="#fffce0"/>
        <text x="80" y="59" fill="#8a6010" font-size="8" text-anchor="middle" font-weight="700" font-family="IBM Plex Mono">SUN</text>

        <!-- SATELLITE body -->
        <rect x="645" y="28" width="60" height="24" rx="3" fill="url(#satGrad)" stroke="#3a6090" stroke-width="1.5"/>
        <!-- solar panels -->
        <rect x="605" y="36" width="40" height="10" rx="1" fill="#1a3060" stroke="#4da6ff" stroke-width="1"/>
        <rect x="705" y="36" width="40" height="10" rx="1" fill="#1a3060" stroke="#4da6ff" stroke-width="1"/>
        <!-- sensor dome -->
        <ellipse cx="675" cy="52" rx="8" ry="4" fill="#0a1628" stroke="#b84dff" stroke-width="1.2"/>
        <text x="675" y="74" fill="#4da6ff" font-size="8" text-anchor="middle" font-family="IBM Plex Mono">SATELLITE</text>
        <text x="675" y="84" fill="#2a4060" font-size="7" text-anchor="middle" font-family="IBM Plex Mono">sensor ↓</text>

        <!-- Wavelength spectrum bar (top right) -->
        <defs>
          <linearGradient id="specG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#9b30ff"/>
            <stop offset="15%" stop-color="#4488ff"/>
            <stop offset="35%" stop-color="#44dd88"/>
            <stop offset="50%" stop-color="#ffe040"/>
            <stop offset="65%" stop-color="#ff6644"/>
            <stop offset="80%" stop-color="#cc3300"/>
            <stop offset="100%" stop-color="#ff8800"/>
          </linearGradient>
        </defs>
        <rect x="420" y="88" width="370" height="8" rx="1" fill="url(#specG)" opacity="0.7"/>
        <text x="420" y="106" fill="#2a3a5a" font-size="6.5" font-family="IBM Plex Mono">UV</text>
        <text x="460" y="106" fill="#2a3a5a" font-size="6.5" font-family="IBM Plex Mono">VIS</text>
        <text x="530" y="106" fill="#2a3a5a" font-size="6.5" font-family="IBM Plex Mono">NIR</text>
        <text x="590" y="106" fill="#2a3a5a" font-size="6.5" font-family="IBM Plex Mono">SWIR</text>
        <text x="660" y="106" fill="#2a3a5a" font-size="6.5" font-family="IBM Plex Mono">MIR</text>
        <text x="730" y="106" fill="#2a3a5a" font-size="6.5" font-family="IBM Plex Mono">TIR</text>
        <!-- CO2 bands markers on spectrum -->
        <rect x="547" y="88" width="5" height="8" fill="#ff4d4d" opacity="0.8"/>
        <rect x="563" y="88" width="5" height="8" fill="#ff4d4d" opacity="0.8"/>
        <rect x="648" y="88" width="7" height="8" fill="#ff4d4d" opacity="0.9"/>
        <rect x="765" y="88" width="8" height="8" fill="#ff4d4d" opacity="0.9"/>
        <text x="549" y="83" fill="#ff6666" font-size="5.5" font-family="IBM Plex Mono" text-anchor="middle">1.6</text>
        <text x="565" y="83" fill="#ff6666" font-size="5.5" font-family="IBM Plex Mono" text-anchor="middle">2.1</text>
        <text x="651" y="83" fill="#ff6666" font-size="5.5" font-family="IBM Plex Mono" text-anchor="middle">4.3</text>
        <text x="769" y="83" fill="#ff6666" font-size="5.5" font-family="IBM Plex Mono" text-anchor="middle">15µm</text>

        <!-- ═══ BEAMS — shown/hidden per step ═══ -->
        <!-- Group IDs: g0..g8 -->

        <!-- STEP 0: overview — show everything dimly -->
        <g id="g0" class="beam">
          <!-- solar incoming -->
          <line x1="98" y1="63" x2="380" y2="280" stroke="#ffe166" stroke-width="2" marker-end="url(#mSolar)" opacity="0.5"/>
          <!-- scattered up -->
          <path d="M220,190 Q170,140 150,100" stroke="#4da6ff" stroke-width="1.5" fill="none" marker-end="url(#mScatter)" opacity="0.5"/>
          <!-- surface reflect -->
          <line x1="380" y1="330" x2="580" y2="150" stroke="#4dffb8" stroke-width="1.5" marker-end="url(#mReflect)" opacity="0.5" stroke-dasharray="5,3"/>
          <!-- thermal emit -->
          <line x1="480" y1="330" x2="560" y2="150" stroke="#ff8c42" stroke-width="1.5" marker-end="url(#mEmit)" opacity="0.5" stroke-dasharray="3,3"/>
          <!-- to satellite -->
          <line x1="580" y1="150" x2="655" y2="52" stroke="#b84dff" stroke-width="1.5" marker-end="url(#mSignal)" opacity="0.5"/>
        </g>

        <!-- STEP 1: Solar beam hits atmosphere top -->
        <g id="g1" class="beam">
          <line x1="98" y1="63" x2="310" y2="105" stroke="#ffe166" stroke-width="3" marker-end="url(#mSolar)"/>
          <text x="175" y="77" fill="#ffe166" font-size="9" font-family="IBM Plex Mono" transform="rotate(20,175,77)">broadband solar</text>
          <text x="180" y="88" fill="#aa8820" font-size="7.5" font-family="IBM Plex Mono" transform="rotate(20,180,88)">0.25 – 4 µm</text>
          <!-- annotation bubble -->
          <rect x="290" y="108" width="220" height="42" rx="3" fill="#0d1528" stroke="#ffe16655" stroke-width="1"/>
          <text x="300" y="122" fill="#ffe166" font-size="8" font-family="IBM Plex Mono">Sun ~5778 K → Planck curve peaks</text>
          <text x="300" y="133" fill="#ffe166" font-size="8" font-family="IBM Plex Mono">at 0.5 µm (green-yellow visible)</text>
          <text x="300" y="144" fill="#6a7a90" font-size="7.5" font-family="IBM Plex Mono">UV 9% | Visible 40% | NIR 51%</text>
        </g>

        <!-- STEP 2: Absorption in upper atmosphere (O3, etc.) -->
        <g id="g2" class="beam">
          <!-- incoming beam -->
          <line x1="98" y1="63" x2="280" y2="155" stroke="#ffe166" stroke-width="3" marker-end="url(#mSolar)" opacity="0.7"/>
          <!-- O3 absorption circle -->
          <circle cx="175" cy="135" r="18" fill="#1a0830" stroke="#9b30ff" stroke-width="2" opacity="0.9"/>
          <text x="175" y="132" fill="#cc88ff" font-size="8" text-anchor="middle" font-family="IBM Plex Mono">O₃</text>
          <text x="175" y="143" fill="#7744aa" font-size="7" text-anchor="middle" font-family="IBM Plex Mono">absorbs</text>
          <!-- absorbed UV squiggle -->
          <path d="M158,128 Q140,115 130,105" stroke="#9b30ff" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
          <text x="112" y="103" fill="#9b30ff" font-size="7" font-family="IBM Plex Mono">UV lost</text>
          <text x="112" y="112" fill="#7744aa" font-size="7" font-family="IBM Plex Mono">&lt;0.31µm</text>
          <!-- beam continues (depleted UV) -->
          <line x1="190" y1="140" x2="290" y2="200" stroke="#ffe166" stroke-width="2" marker-end="url(#mSolar)" opacity="0.6"/>
          <!-- annotation -->
          <rect x="295" y="160" width="260" height="60" rx="3" fill="#0d1528" stroke="#9b30ff55" stroke-width="1"/>
          <text x="305" y="174" fill="#cc88ff" font-size="8" font-family="IBM Plex Mono">Ozone (O₃) in stratosphere</text>
          <text x="305" y="185" fill="#8a6aaa" font-size="7.5" font-family="IBM Plex Mono">absorbs nearly all UV &lt; 0.31 µm</text>
          <text x="305" y="196" fill="#8a6aaa" font-size="7.5" font-family="IBM Plex Mono">Hartley band → ozone heats up</text>
          <text x="305" y="207" fill="#6a5a8a" font-size="7.5" font-family="IBM Plex Mono">Beam continues: VIS + NIR remain</text>
        </g>

        <!-- STEP 3: Scattering (Rayleigh + Mie) -->
        <g id="g3" class="beam">
          <!-- incoming -->
          <line x1="98" y1="63" x2="260" y2="210" stroke="#ffe166" stroke-width="2.5" opacity="0.6"/>
          <!-- scatter node -->
          <circle cx="200" cy="195" r="10" fill="#0a1428" stroke="#4da6ff" stroke-width="2"/>
          <text x="200" y="199" fill="#4da6ff" font-size="7" text-anchor="middle" font-family="IBM Plex Mono">R</text>
          <!-- scattered blue up to space -->
          <path d="M196,185 Q170,150 155,100" stroke="#4da6ff" stroke-width="2" fill="none" marker-end="url(#mScatter)"/>
          <text x="150" y="148" fill="#4da6ff" font-size="8" font-family="IBM Plex Mono">Blue ↑</text>
          <text x="150" y="158" fill="#2a5090" font-size="7" font-family="IBM Plex Mono">0.45µm</text>

          <!-- Mie scatter node -->
          <circle cx="310" cy="270" r="10" fill="#0a1428" stroke="#88bbff" stroke-width="1.8"/>
          <text x="310" y="274" fill="#88bbff" font-size="7" text-anchor="middle" font-family="IBM Plex Mono">M</text>
          <!-- mie scatter upward -->
          <path d="M310,260 Q280,210 265,100" stroke="#88bbff" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#mScatter)"/>
          <text x="250" y="175" fill="#558899" font-size="8" font-family="IBM Plex Mono">All λ ↑</text>

          <!-- beam continues down -->
          <line x1="210" y1="200" x2="370" y2="325" stroke="#ffe166" stroke-width="2" marker-end="url(#mSolar)" opacity="0.5"/>

          <!-- annotation -->
          <rect x="380" y="140" width="300" height="90" rx="3" fill="#0d1528" stroke="#4da6ff55" stroke-width="1"/>
          <text x="390" y="155" fill="#4da6ff" font-size="8" font-family="IBM Plex Mono">Rayleigh Scattering (molecules)</text>
          <text x="390" y="166" fill="#3a6090" font-size="7.5" font-family="IBM Plex Mono">• Intensity ∝ 1/λ⁴ → blue scatters 5× red</text>
          <text x="390" y="177" fill="#3a6090" font-size="7.5" font-family="IBM Plex Mono">• Blue goes in ALL directions → blue sky</text>
          <text x="390" y="192" fill="#7799bb" font-size="8" font-family="IBM Plex Mono">Mie Scattering (aerosols/dust/cloud)</text>
          <text x="390" y="203" fill="#3a6090" font-size="7.5" font-family="IBM Plex Mono">• Wavelength-independent → white haze</text>
          <text x="390" y="214" fill="#3a6090" font-size="7.5" font-family="IBM Plex Mono">• Both scatter BACK to space → lost signal</text>
          <text x="390" y="222" fill="#3a6090" font-size="7" font-family="IBM Plex Mono">  ~30% of solar reflected by clouds/aerosols</text>
        </g>

        <!-- STEP 4: CO2/H2O Absorption mid-atmosphere -->
        <g id="g4" class="beam">
          <!-- beam from above -->
          <line x1="98" y1="63" x2="260" y2="210" stroke="#ffe166" stroke-width="2" opacity="0.4"/>
          <line x1="260" y1="210" x2="350" y2="285" stroke="#ffe166" stroke-width="2.5" opacity="0.7"/>

          <!-- CO2 absorption event -->
          <circle cx="350" cy="215" r="14" fill="#1a0808" stroke="#ff4d4d" stroke-width="2.2"/>
          <text x="350" y="212" fill="#ff4d4d" font-size="8" text-anchor="middle" font-family="IBM Plex Mono">CO₂</text>
          <text x="350" y="222" fill="#993333" font-size="7" text-anchor="middle" font-family="IBM Plex Mono">absorb</text>
          <!-- absorbed band lines going off -->
          <line x1="340" y1="203" x2="310" y2="175" stroke="#ff4d4d" stroke-width="1.5" stroke-dasharray="3,2"/>

    col2: 'CO₂ satellites prefer bright scenes (deserts, snow) because more reflected signal means a stronger, cleaner measurement. Over dark oceans, the signal is so weak that noise overwhelms the CO₂ dips. OCO-2 has three observation modes to cope with this (nadir, glint, and target modes).',

    col3: 'The reflected solar beam now heads back upward carrying the spectral "imprint" of the atmosphere it already passed through — CO₂ dips from the downward pass. It will pass through the atmosphere AGAIN on the way up, doubling the CO₂ absorption signal (two-way path). This is what makes passive SWIR CO₂ retrieval possible.',
    formula: 'Surface albedo: a = reflected / incident\nTwo-way optical depth: τ_total = 2 × τ_one-way\nStronger absorption dip → easier retrieval'
  },
  {
    id: 6,
    color: '#ff8c42',
    cls: 'c-emit',
    label: 'Step 6',
    title: 'Earth Thermal Emission',
    col1h: 'Earth as a blackbody',
    col1: 'The Earth surface (avg ~288 K / 15°C) emits thermal radiation peaking at about 10 µm — in the thermal infrared (TIR). This is entirely separate from reflected sunlight. It\'s emitted continuously, day and night. This is the greenhouse effect\'s mechanism: CO₂ intercepts this outgoing radiation.',
    col2h: 'CO₂ and the greenhouse effect',
    col2: 'CO₂ absorbs outgoing TIR at 15 µm and 4.3 µm. It re-emits in all directions — some back downward (warming the surface), some upward toward space. The satellite measures the upward-emitted TIR from the CO₂ layer. Higher CO₂ → more emission from higher, colder levels → satellite sees less radiance at 15 µm.',
    col3h: 'TIR vs SWIR for satellites',
    col3: 'TIR instruments (AIRS, IASI, CrIS) measure this thermal emission and are sensitive to CO₂ in the mid-to-upper troposphere. They work at night. SWIR instruments (OCO-2, GOSAT) measure reflected sunlight and are sensitive to the full column including near-surface CO₂. Together they provide complementary information.',
    formula: 'Planck: B(λ,288K) → peaks ~10 µm\nCO₂ 15µm band: strong absorption\nWeighting fn → sensitivity vs altitude\nBrightness temp. Tb vs CO₂ amount'
  },
  {
    id: 7,
    color: '#b84dff',
    cls: 'c-signal',
    label: 'Step 7',
    title: 'Mixed Signal at Satellite',
    col1h: 'What the satellite actually receives',
    col1: 'The satellite\'s detector receives a mixture of: (A) reflected solar light that passed through CO₂ twice (SWIR, 1.6 & 2.06 µm), (B) thermal emission from CO₂ and the surface (TIR, 4.3 & 15 µm), (C) scattered solar light (visible), and (D) direct solar/lunar glint. Each component carries different CO₂ information.',
    col2h: 'The CO₂ fingerprint in the spectrum',
    col2: 'At 1.6 and 2.06 µm, the reflected spectrum shows absorption dips. The depth of these dips is proportional to the total CO₂ in the column. At 15 µm, the thermal spectrum shows a "bump" from CO₂ emission — but the shape tells us the vertical distribution (profile) of CO₂.',
    col3h: 'Separating the components',
    col3: 'Modern satellites use high-resolution spectrometers to resolve thousands of individual spectral lines within each CO₂ band. Different lines have different sensitivities to altitude. By analyzing the pattern of line depths, retrieval algorithms can separate surface CO₂ from upper-troposphere CO₂ and correct for clouds and aerosols.',
    formula: 'L_obs(λ) = L_surface_reflect(λ)\n        + L_atm_scatter(λ)\n        + L_thermal_emit(λ)\n        - L_absorbed_by_CO2(λ)\nAll terms function of CO₂ column'
  },
  {
    id: 8,
    color: '#ffe166',
    cls: 'c-solar',
    label: 'Step 8',
    title: 'Retrieving XCO₂',
    col1h: 'The retrieval problem',
    col1: 'The satellite measures a spectrum I_obs(λ). We want to find the CO₂ amount (XCO₂) that would produce exactly this spectrum. This is an inverse problem — we run a forward radiative transfer model many times, adjusting CO₂ (and aerosols, albedo, water vapor...) until the modeled spectrum matches the observed one.',
    col2h: 'O₂ A-band normalization',
    col2: 'Crucially, the O₂ A-band at 0.76 µm is measured simultaneously. O₂ is 20.95% of the atmosphere — a known, stable concentration. Its absorption depth tells us the path length and surface pressure. Dividing the CO₂ absorption by the O₂ signal cancels out geometric errors from viewing angle, cloud height, etc.',
    col3h: 'Precision and validation',
    col3: 'OCO-2 achieves ~0.5 ppm precision on a background of ~420 ppm — that\'s 0.1% accuracy needed to detect regional CO₂ fluxes. The retrieved XCO₂ fields are validated against ground-based TCCON spectrometers and used to infer CO₂ sources (power plants, cities) and sinks (forests, oceans) via inverse modeling.',
    formula: 'XCO₂ = ∫ x_CO2(z)·p(z) dz / ∫ p(z) dz\nOptimal est: minimize J = (x-xa)ᵀSa⁻¹(x-xa)\n                      + (y-F(x))ᵀSe⁻¹(y-F(x))\nx=state vector, y=measured spectrum\nF(x)=forward model, Sa=prior covariance'
  }
];

// Build step buttons
const panel = document.getElementById('stepsPanel');
steps.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'step-btn' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `
    <div class="step-num ${s.cls}">${s.id}</div>
    <div>
      <span class="step-title ${s.cls}">${s.label}: ${s.title}</span>
      <span class="step-label">${s.col1.substring(0,60)}...</span>
    </div>
  `;
  btn.addEventListener('click', () => activate(i));
  panel.appendChild(btn);
});

function activate(idx) {
  // update buttons
  document.querySelectorAll('.step-btn').forEach((b,i) => {
    b.classList.toggle('active', i === idx);
  });
  // show/hide beams
  for (let i = 0; i <= 8; i++) {
    const g = document.getElementById('g' + i);
    if (g) g.classList.toggle('show', i === idx);
  }
  // update info panel
  const s = steps[idx];
  document.getElementById('infoPanel').innerHTML = `
    <div class="info-col">
      <h4>${s.col1h}</h4>
      <p class="main-text">${s.col1}</p>
    </div>
    <div class="info-col">
      <h4>${s.col2h}</h4>
      <p class="main-text">${s.col2}</p>
      ${s.formula ? `<div class="formula">${s.formula.replace(/\n/g,'<br>')}</div>` : ''}
    </div>
    <div class="info-col">
      <h4>${s.col3h}</h4>
      <p class="main-text">${s.col3}</p>
    </div>
  `;
}

// init
activate(0);
</script>
