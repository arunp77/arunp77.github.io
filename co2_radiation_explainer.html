.c-solar  {color:var(--solar);  border-color:var(--solar);}

<!--
  ═══════════════════════════════════════════════════
  MASTER GEOMETRY (viewBox 0 0 800 480)
  ───────────────────────────────────────────────────
  Sun centre        : (80, 55)   body-r=18, glow-r=32
  Satellite body    : rect(645,28,60,24)  centre≈(675,40)
  Sensor dome       : ellipse(675,52)
  Atmosphere band   : y=100 → y=330
  Earth surface     : y=330+

  MAIN SOLAR BEAM  (Sun→surface, straight)
    Origin (sun edge): (98, 63)
    Surface impact  : (420, 330)
    Slope dx/dy = (420-98)/(330-63) = 322/267 = 1.2060
    Point at y=100  → x = 98 + 1.206*(100-63) = 143  → (143,100)
    Point at y=130  → x = 98 + 1.206*(130-63) = 179  → (179,130)
    Point at y=160  → x = 98 + 1.206*(160-63) = 215  → (215,160)
    Point at y=190  → x = 98 + 1.206*(190-63) = 251  → (251,190)
    Point at y=220  → x = 98 + 1.206*(220-63) = 287  → (287,220)
    Point at y=260  → x = 98 + 1.206*(260-63) = 336  → (336,260)
    Point at y=300  → x = 98 + 1.206*(300-63) = 384  → (384,300)

  REFLECTED BEAM   (surface→satellite)
    Origin : (420, 330)
    Target : satellite sensor (675, 52)
    Slope dx/dy = (675-420)/(52-330) = 255/(-278) = -0.917 (x per y going up)
    Point at y=100 → t=(100-330)/(52-330)=0.827 → x=420+0.827*255=631 → (631,100)
    Point at y=160 → t=(160-330)/(52-330)=0.612 → x=420+0.612*255=576 → (576,160)
    Point at y=200 → t=(200-330)/(52-330)=0.468 → x=420+0.468*255=539 → (539,200)
    Point at y=230 → t=(230-330)/(52-330)=0.360 → x=420+0.360*255=512 → (512,230)
  ═══════════════════════════════════════════════════
-->

<!-- ═══════════════════════════════════════════════════════════════

     Scientific note: beam shown full-width, broadband label.
══════════════════════════════════════════════════════════════════ -->
<g id="g1" class="beam">

  <!-- Full solar beam from sun to surface (shows the complete pathway) -->

        transform="rotate(22,113,79)">0.25 – 4 µm</text>

<!-- ═══════════════════════════════════════════════════════════════

     Scientific accuracy:
     • Rayleigh scattering: occurs THROUGHOUT the atmosphere (whole column)
       but stronger higher up (less air mass). Node placed upper-mid atmo.
     • Mie scattering (aerosols): concentrated in LOWER troposphere (boundary layer)
       Node placed low in atmo (~y=290).
     • Scattered rays go in multiple directions — show one going to space
       (backward scatter) and one downward (forward scatter).
     • Blue light (0.45µm) scatters 5.5x more than red (Rayleigh).
     • Mie is wavelength-independent → white haze.
══════════════════════════════════════════════════════════════════ -->

  <!-- Dimmed main beam above Mie node -->

  <text x="430" y="164" fill="#3a5a80" font-size="7.5" font-family="IBM Plex Mono">• Intensity ∝ 1/λ⁴ → blue (0.45µm) scatters</text>

<!-- ═══════════════════════════════════════════════════════════════

       → show as small radiating lines from the node, not a directed arrow
     • Beam becomes progressively dimmer/thinner after each absorption
     • Beer-Lambert law governs the attenuation
══════════════════════════════════════════════════════════════════ -->
<g id="g4" class="beam">

<!-- ═══════════════════════════════════════════════════════════════
     STEP 5 — SURFACE REFLECTION
     Scientific accuracy:
     • Show the FULL two-pass concept clearly:
       - Pass 1 (down): beam arrives attenuated at surface
       - Surface reflects fraction = albedo
       - Pass 2 (up): reflected beam passes THROUGH atmosphere again
         → CO₂ absorbs AGAIN at 1.6, 2.06µm on upward path
         → dips are now DOUBLED relative to single-pass
     • Reflected path geometry: (420,330)→(631,100)→satellite (675,52)
     • CO₂ absorption node on upward path at (539,200)
══════════════════════════════════════════════════════════════════ -->
<g id="g5" class="beam">

  <!-- Pass 1 — downward solar beam (faded, context) -->

  <circle cx="420" cy="333" r="7" fill="#0d1e0e" stroke="#4dffb8" stroke-width="2"/>
  <!-- Multiple small reflection vectors from the surface dot (Lambertian reflector) -->
  <line x1="418" y1="326" x2="395" y2="308" stroke="#4dffb8" stroke-width="1"   opacity="0.4"/>
  <line x1="420" y1="326" x2="420" y2="302" stroke="#4dffb8" stroke-width="1"   opacity="0.4"/>

  <text x="350" y="350" fill="#4dffb8" font-size="7.5" font-family="IBM Plex Mono" font-weight="600">Surface Albedo</text>
  <text x="350" y="362" fill="#2a7050" font-size="7.5" font-family="IBM Plex Mono">Ocean   ~0.06 (very dark)</text>

  <text x="350" y="395" fill="#2a7050" font-size="7.5" font-family="IBM Plex Mono">Snow    ~0.80–0.90 ← strongest signal</text>
  <text x="350" y="408" fill="#1a5035" font-size="7"   font-family="IBM Plex Mono">High albedo → stronger CO₂ dip signal</text>
  <text x="350" y="418" fill="#1a5035" font-size="7"   font-family="IBM Plex Mono">Dark ocean → too dim for SWIR retrieval</text>

  <!-- Pass 2 — upward reflected beam -->
  <!-- Surface → CO₂ absorption node on reflected path at y=200: (539,200) -->

  <!-- Step ①: Measure -->
  <text x="398" y="142" fill="#4da6ff" font-size="8" font-family="IBM Plex Mono" font-weight="600">① Measure spectrum I_obs(λ)</text>
  <text x="398" y="153" fill="#2a4a70" font-size="7" font-family="IBM Plex Mono">   Spectrometer (R~20,000) disperses light onto detector array</text>
  <text x="398" y="163" fill="#2a4a70" font-size="7" font-family="IBM Plex Mono">   Records radiance at each wavelength simultaneously</text>

  <!-- Step ②: O2 normalization -->
  <text x="398" y="178" fill="#4dffb8" font-size="8" font-family="IBM Plex Mono" font-weight="600">② O₂ A-band reference (0.76 µm)</text>
  <text x="398" y="189" fill="#2a5a40" font-size="7" font-family="IBM Plex Mono">   O₂ = 20.95% of air (fixed, well-known)</text>
  <text x="398" y="199" fill="#2a5a40" font-size="7" font-family="IBM Plex Mono">   O₂ dip depth → path length + surface pressure</text>
  <text x="398" y="209" fill="#2a5a40" font-size="7" font-family="IBM Plex Mono">   Dividing CO₂/O₂ cancels viewing-angle geometry</text>

  <!-- Step ③: Forward model -->
  <text x="398" y="224" fill="#ff8c42" font-size="8" font-family="IBM Plex Mono" font-weight="600">③ Forward Radiative Transfer Model (RTM)</text>
  <text x="398" y="235" fill="#664400" font-size="7" font-family="IBM Plex Mono">   Simulate I_mod(λ) for a trial state vector:</text>
  <text x="398" y="245" fill="#664400" font-size="7" font-family="IBM Plex Mono">   x = [XCO₂, H₂O, T(z), aerosol, albedo, ...]</text>
  <text x="398" y="255" fill="#664400" font-size="7" font-family="IBM Plex Mono">   HITRAN spectral database → σ(λ,T,p) for each gas</text>

  <!-- Step ④: Inversion -->
  <text x="398" y="270" fill="#ff4d4d" font-size="8" font-family="IBM Plex Mono" font-weight="600">④ Optimal Estimation Inversion</text>
  <text x="398" y="281" fill="#882222" font-size="7" font-family="IBM Plex Mono">   Iterate x until I_mod(λ) ≈ I_obs(λ)</text>
  <text x="398" y="291" fill="#882222" font-size="7" font-family="IBM Plex Mono">   Cost fn: J = (x−xₐ)ᵀSₐ⁻¹(x−xₐ) + (y−F(x))ᵀSₑ⁻¹(y−F(x))</text>
  <text x="398" y="301" fill="#882222" font-size="7" font-family="IBM Plex Mono">   xₐ = prior, Sₐ = prior covariance, Sₑ = obs error</text>

  <!-- Step ⑤: Output -->
  <text x="398" y="316" fill="#ffe166" font-size="8" font-family="IBM Plex Mono" font-weight="600">⑤ Output: XCO₂ (ppm)</text>
  <text x="398" y="327" fill="#886600" font-size="7" font-family="IBM Plex Mono">   XCO₂ = ∫ x_CO₂(z)·p(z)dz / ∫ p(z)dz</text>
  <text x="398" y="337" fill="#886600" font-size="7" font-family="IBM Plex Mono">   Pressure-weighted column average dry-air mole fraction</text>
  <text x="398" y="347" fill="#886600" font-size="7" font-family="IBM Plex Mono">   e.g.  421.5 ± 0.5 ppm  (OCO-2 target precision)</text>

  <!-- Beer-Lambert key formula box -->
  <rect x="396" y="355" width="376" height="36" rx="2"
        fill="#0a0c14" stroke="#ffe16633" stroke-width="1"/>
  <text x="403" y="369" fill="#ffe16680" font-size="7.5" font-family="IBM Plex Mono">Beer-Lambert:  I(λ) = I₀(λ) · exp(−∫ n_CO₂(z) · σ(λ,T,p) · dz)</text>
  <text x="403" y="382" fill="#556680"  font-size="7"   font-family="IBM Plex Mono">σ(λ) known from HITRAN;  n_CO₂(z) is what we retrieve → XCO₂</text>

  <!-- Bottom note: spectrum diagram link -->
  <text x="30" y="302" fill="#336644" font-size="7" font-family="IBM Plex Mono">← Deeper dips = more CO₂ in column</text>
  <text x="30" y="312" fill="#336644" font-size="7" font-family="IBM Plex Mono">← O₂ dip normalises path length &amp; pressure</text>
</g>

</svg>
    </div>

    <!-- INFO PANEL -->
    <div class="info-panel" id="infoPanel"></div>
  </div>
</div>

<script>
const steps = [
  {
    id: 0, color: '#ffe166', cls: 'c-solar',
    label: 'Overview', title: 'Full Picture',
    col1h: 'The Journey',
    col1: 'Sunlight enters the atmosphere and undergoes five key transformations before any signal reaches a CO₂ satellite. The overview diagram labels each process with a circled number ①–⑤ so you can see how they relate spatially. Click any numbered step on the left to zoom into that process.',
    col2h: 'Why CO₂ is Special',
    col2: 'CO₂ absorbs light at very specific wavelengths (1.6, 2.06, 4.3, 15 µm) — acting like a "spectral fingerprint." By measuring how deep the absorption dips are, satellites can calculate how much CO₂ exists in the entire atmospheric column below.',
    col3h: 'Five Key Processes',
    col3: '① Solar beam enters (0.25–4 µm). ② Scattering (Rayleigh/Mie) reflects some back to space. ③ Surface reflects remainder upward toward satellite. ④ Earth also emits thermal IR (8–15 µm). ⑤ CO₂ absorbs at specific wavelengths on both beam passes — leaving measurable dips.',
    formula: ''
  },
  {
    id: 1, color: '#ffe166', cls: 'c-solar',
    label: 'Step 1', title: 'Solar Radiation Enters',
    col1h: 'What enters the atmosphere',
    col1: 'The Sun emits a broadband Planck spectrum peaking near 0.5 µm (green-yellow). At the top of atmosphere (TOA) it spans ~0.25 µm (UV) to 4 µm (SWIR) at 1361 W/m². This is the starting illumination — everything that follows is this beam being filtered, scattered, or re-emitted.',
    col2h: 'Energy distribution',
    col2: 'About 9% is UV (below 0.4 µm), 40% is visible (0.4–0.7 µm), and 51% is near-infrared and SWIR (0.7–4 µm). The NIR/SWIR region is critical — this is where CO₂ leaves its two strongest satellite-accessible fingerprints at 1.6 and 2.06 µm.',
    col3h: 'Why two blackbody curves matter',
    col3: 'Sun T≈5778 K → peak 0.5 µm (visible). Earth T≈288 K → peak 10 µm (TIR). These two curves define two completely different measurement regimes: reflected solar (SWIR, daytime only) and thermal emission (TIR, day and night). Satellites can exploit both.',
    formula: 'Planck: B(λ,T) = (2hc²/λ⁵)·1/(e^(hc/λkT)−1)\nSun 5778K → peak 0.50 µm\nEarth 288K → peak 10.0 µm\nSolar constant at TOA: ~1361 W/m²'
  },
  {
    id: 2, color: '#9b30ff', cls: 'c-absorb',
    label: 'Step 2', title: 'O₃ Absorbs UV (Stratosphere)',
    col1h: 'Where this happens',
    col1: 'In the stratosphere (15–50 km), ozone (O₃) absorbs nearly all UV below 0.31 µm via the Hartley band (0.20–0.31 µm) and the Huggins bands (0.31–0.36 µm). The absorbed UV energy heats the stratosphere — it is NOT reflected back to space, it dissipates thermally.',
    col2h: 'Why it matters for CO₂ satellites',
    col2: 'The UV removal itself is irrelevant for CO₂ retrieval (satellites use NIR/SWIR). However ozone absorbs weakly in the visible (Chappuis band, 0.45–0.75 µm), which slightly contaminates the signal and must be modelled. Ozone column is typically ~300 Dobson Units.',
    col3h: 'What passes through into troposphere',
    col3: 'After the stratospheric ozone layer, the beam is stripped of all UV below 0.31 µm but retains full visible and NIR/SWIR intensity. This depleted beam then continues into the troposphere where CO₂ and H₂O begin to leave their absorption fingerprints.',
    formula: 'Hartley band: 0.20–0.31 µm (very strong)\nHuggins band: 0.31–0.36 µm (moderate)\nChappuis band: 0.45–0.75 µm (weak, VIS)\nTypical column: ~300 DU (Dobson Units)'
  },
  {
    id: 3, color: '#4da6ff', cls: 'c-scatter',
    label: 'Step 3', title: 'Scattering (Rayleigh + Mie)',
    col1h: 'Rayleigh Scattering (whole column)',
    col1: 'Gas molecules (N₂, O₂) scatter sunlight elastically throughout the whole atmospheric column. Intensity scales as 1/λ⁴, so blue light (0.45 µm) scatters ~5.5× more than red (0.70 µm). The sky is blue because blue scatter reaches your eyes from all angles. This affects satellite signals at all wavelengths.',
    col2h: 'Mie Scattering (lower troposphere)',
    col2: 'Larger particles — dust, sea salt, smoke, and cloud droplets — scatter in a wavelength-independent way concentrated in the boundary layer (0–2 km). This is why clouds look white and haze reduces visibility. Aerosols can reflect 20–40% of solar radiation globally and cause the biggest errors in CO₂ retrievals.',
    col3h: 'Impact on CO₂ retrieval',
    col3: 'Scattered light returning to space never samples the full atmospheric CO₂ column, biasing the measurement. Aerosol optical depth (AOD) must be co-retrieved. OCO-2 rejects scenes with AOD > 0.3 and uses aerosol parameters as part of its state vector alongside XCO₂.',
    formula: 'Rayleigh: σ_R ∝ λ⁻⁴  (molecular)\nMie: σ_M ≈ const  (particles r>0.1µm)\nOptical depth: τ = ∫ n(z)·σ dz\nτ_Rayleigh(0.76µm) ≈ 0.05 (whole column)'
  },
  {
    id: 4, color: '#ff4d6d', cls: 'c-absorb',
    label: 'Step 4', title: 'CO₂ & H₂O Absorption (Downward)',
    col1h: 'CO₂ absorption bands',
    col1: 'As sunlight descends through the troposphere, CO₂ absorbs at 1.6 µm (weak NIR overtone), 2.06 µm (stronger NIR overtone), 4.3 µm (very strong MIR fundamental), and 15 µm (TIR bending mode). Each absorbed photon is re-emitted in a random direction — it is NOT reflected back. The forward beam is progressively attenuated.',
    col2h: 'H₂O interference and co-retrieval',
    col2: 'Water vapour absorbs strongly at 1.37, 1.87, 2.7, and 6.3 µm — overlapping with CO₂ retrieval windows. Satellites must retrieve H₂O profiles simultaneously with CO₂ to avoid systematic bias. H₂O varies hugely in space and time, making it one of the largest retrieval error sources after aerosols.',
    col3h: 'Beer-Lambert attenuation',
    col3: 'The beam intensity decreases exponentially with CO₂ column amount (Beer-Lambert law): I=I₀·exp(−σNL). More CO₂ means deeper absorption dips in the spectrum reaching the satellite. This downward pass is the first of two traversals — the reflected beam will pass through the same column again on the way up, doubling the signal.',
    formula: 'Beer-Lambert: I = I₀ · exp(−σ · N · L)\nσ = absorption cross-section [cm²/molecule]\nN = CO₂ column [molecules/cm²]\nL = path length [cm]\nσ from HITRAN database (T,p-dependent)'
  },
  {
    id: 5, color: '#4dffb8', cls: 'c-reflect',
    label: 'Step 5', title: 'Surface Reflection (Two-Way Path)',
    col1h: 'Surface albedo',
    col1: 'Light reaching the surface is partially reflected upward; the fraction reflected is the albedo. Ocean ≈ 0.06 (very dark), forest ≈ 0.12, desert ≈ 0.35, snow/ice ≈ 0.85. CO₂ satellites strongly prefer bright surfaces (desert, snow) because the reflected signal-to-noise ratio is much higher and CO₂ dips are more visible.',
    col2h: 'The critical two-way path geometry',
    col2: 'The reflected beam must traverse the CO₂ column TWICE: once going down and once going back up. Each traversal leaves absorption dips at 1.6 and 2.06 µm. The total optical depth seen by the satellite is τ_total = 2 × τ_one-way. This doubling is what makes passive SWIR CO₂ retrieval sensitive enough to detect ~0.1% changes in column CO₂.',
    col3h: 'OCO-2 observation modes',
    col3: 'Precisely because surface brightness matters so much, OCO-2 uses three modes: (1) Nadir — looks straight down at land surfaces; (2) Glint — looks at specular reflection off the ocean to boost signal over dark water; (3) Target — stares at a fixed ground site for calibration. Each mode optimises the two-way path for different scenes.',
    formula: 'τ_total = 2 × τ_one-way (two-way path)\nAlbedo: a = F_reflected / F_incident\nOCO-2 needs a > 0.05 for valid retrieval\nGlint angle: θ_glint ≈ solar zenith angle'
  },
  {
    id: 6, color: '#ff8c42', cls: 'c-emit',
    label: 'Step 6', title: 'Earth Thermal Emission (TIR)',
    col1h: 'Earth as a 288 K blackbody',
    col1: 'The Earth surface (mean ~288 K / 15°C) emits thermal radiation peaking near 10 µm — entirely separate from reflected sunlight. This emission is continuous, day and night. CO₂ intercepts this outgoing infrared at the 15 µm bending-mode band, creating the primary greenhouse mechanism.',
    col2h: 'The greenhouse effect mechanism',
    col2: 'CO₂ absorbs upwelling TIR at 15 µm in the troposphere, then re-emits in ALL directions: some upward (eventually reaching space and the satellite), and critically, some BACK DOWNWARD toward the surface. This downward re-emission is the greenhouse warming mechanism — it reduces the net radiative cooling of the surface.',
    col3h: 'TIR satellite measurements',
    col3: 'Instruments like AIRS, IASI, and CrIS measure the upward TIR emission from CO₂. Higher CO₂ concentrations push the emission level higher in the atmosphere (where it is colder), reducing the brightness temperature at 15 µm seen from space. TIR retrievals are most sensitive to the mid and upper troposphere (~500–200 hPa).',
    formula: 'Planck peak: λ_max = 2898/T µm\nT=288K → peak ≈ 10.1 µm\nCO₂ 15µm band: bending mode (ν₂)\nTb(15µm) decreases as [CO₂] increases\nWeighting fn W(z) = ∂τ/∂z·exp(−τ)'
  },
  {
    id: 7, color: '#b84dff', cls: 'c-signal',
    label: 'Step 7', title: 'Mixed Signal at Satellite',
    col1h: 'Three physically distinct signal paths',
    col1: 'The satellite sensor receives: (A) reflected solar radiation (teal path) — carries CO₂ absorption dips at 1.6 and 2.06 µm from the two-way path; (B) Earth thermal emission (orange dashed) — carries CO₂ emission signature at 15 µm; (C) Rayleigh/Mie scattered sunlight (blue) — carries VIS radiance with less CO₂ information.',
    col2h: 'The CO₂ spectral fingerprint',
    col2: 'In the reflected solar spectrum, CO₂ leaves narrow absorption dips at 1.6 and 2.06 µm. The depth of these dips is proportional to the total CO₂ column (two-way Beer-Lambert). An O₂ A-band dip at 0.76 µm is also present — used as a reference to normalise path length and surface pressure.',
    col3h: 'Spectral resolution requirement',
    col3: 'CO₂ absorption is NOT a broad smooth dip — it consists of thousands of individual spectral lines a few tenths of a nanometre wide. A spectral resolving power of R~20,000 is needed to resolve individual CO₂ lines. The line pattern also encodes altitude sensitivity, allowing profile information to be extracted.',
    formula: 'L_obs(λ) = L_reflect(λ) + L_scatter(λ)\n         + L_thermal(λ) + L_fluor(λ)\nResolving power: R = λ/Δλ > 20,000\nOCO-2: R≈20,000 at 1.6 and 2.06 µm'
  },
  {
    id: 8, color: '#ffe166', cls: 'c-solar',
    label: 'Step 8', title: 'Retrieving XCO₂',
    col1h: 'The inverse retrieval problem',
    col1: 'The satellite measures spectrum I_obs(λ). We want the CO₂ column amount XCO₂ that would produce this spectrum. This is solved iteratively: run a forward radiative transfer model (RTM) with a trial XCO₂, compare modelled vs observed spectrum, adjust XCO₂, repeat until they match.',
    col2h: 'O₂ A-band normalisation',
    col2: 'The O₂ A-band at 0.76 µm is observed simultaneously. O₂ is 20.95% of the dry atmosphere — a known, stable fraction. Its absorption depth provides the photon path length and surface pressure. Dividing CO₂ absorption by O₂ absorption cancels geometric errors (viewing angle, cloud height, topography).',
    col3h: 'Precision achieved and validation',
    col3: 'OCO-2 achieves ~0.5 ppm single-sounding precision on a background of ~420 ppm — 0.12% relative accuracy. Retrievals are validated against the global TCCON network of ground-based Fourier-transform spectrometers. These XCO₂ maps then feed atmospheric inversion models that locate CO₂ sources and sinks globally.',
    formula: 'XCO₂ = ∫ x(z)·h(z)·p(z)dz / ∫ h(z)·p(z)dz\nh(z) = averaging kernel (sensitivity vs alt)\nCost fn: J = (x−xₐ)ᵀSₐ⁻¹(x−xₐ)\n           + (y−F(x))ᵀSₑ⁻¹(y−F(x))\nOCO-2 precision: ~0.5 ppm (target: <1ppm)'
  }
];

const panel = document.getElementById('stepsPanel');
steps.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'step-btn' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `
    <div class="step-num ${s.cls}">${s.id}</div>
    <div>
      <span class="step-title ${s.cls}">${s.label}: ${s.title}</span>
      <span class="step-label">${s.col1.substring(0,64)}...</span>
    </div>
  `;
  btn.addEventListener('click', () => activate(i));
  panel.appendChild(btn);
});

function activate(idx) {
  document.querySelectorAll('.step-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  for (let i = 0; i <= 8; i++) {
    const g = document.getElementById('g' + i);
    if (g) g.classList.toggle('show', i === idx);
  }
  const s = steps[idx];
  document.getElementById('infoPanel').innerHTML = `
    <div class="info-col">
      <h4>${s.col1h}</h4>
      <p class="main-text">${s.col1}</p>
    </div>
    <div class="info-col">
      <h4>${s.col2h}</h4>
      <p class="main-text">${s.col2}</p>
      ${s.formula ? `<div class="formula">${s.formula.replace(/\n/g,'<br>')}</div>` : ''}
    </div>
    <div class="info-col">
      <h4>${s.col3h}</h4>
      <p class="main-text">${s.col3}</p>
    </div>
  `;
}

activate(0);
</script>
